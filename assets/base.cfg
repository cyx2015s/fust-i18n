[virtual-signal-description]
signal-anything=在判断运算器中：用作判断参数时，至少有一个输入信号满足判断条件就会允许信号输出，若没有输入信号会默认禁止信号输出。
signal-each=在判断运算器中：用作判断参数时，会对每个输入信号分别进行判断，若满足判断条件分别允许信号输出；用作输出信号时，会分别输出满足判断条件的输入信号。\n在算术运算器中：用作运算参数时，会对每个输入信号分别进行运算；用作输出信号时，会分别输出各输入信号的运算结果，否则会输出运算结果之和。
signal-everything=在判断运算器中：用作判断参数时，只有所有输入信号都满足判断条件才会允许信号输出，若没有输入信号会默认允许信号输出；用作输出信号时，会输出所有的输入信号。
signal-fluid-parameter=特殊通配信号\n在时刻表的中断机制中使用时，它会匹配第一个满足所有发车条件的流体，并用该流体替换信号。\n这也会替换目标站点名称中的富文本标签。
signal-fuel-parameter=特殊通配信号\n在时刻表的中断机制中使用时，它会匹配第一个满足所有发车条件的燃料，并用该燃料替换信号。\n这也会替换目标站点名称中的富文本标签。
signal-item-parameter=特殊通配信号\n在时刻表的中断机制中使用时，它会匹配第一个满足所有发车条件的物品，并用该物品替换信号。\n这也会替换目标站点名称中的富文本标签。
signal-signal-parameter=特殊通配信号\n在时刻表的中断机制中使用时，它会匹配第一个满足所有发车条件的信号，并用该信号替换为匹配的信号。\n这也会替换目标站点名称中的富文本标签。
