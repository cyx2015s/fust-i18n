[tips-and-tricks-item-description]
active-provider-chest=[entity=active-provider-chest] 会主动尝试将物品推送至物流网络。\n如果主动供货箱（紫箱）中的某个物品目前没有请求，则会被送往[entity=storage-chest] 。
belt-lanes=[entity=transport-belt]上有两条运送线路，可用来运送不同的物品或矿石。\n[entity=inserter]抓取时，两条运送线路都能抓到；放置时，只会放到远端运送线路上。
buffer-chest=[entity=buffer-chest] 同时充当[entity=requester-chest]与[entity=passive-provider-chest]。\n可以为多种场景供货，如建设作业、背包物流、已启用「允许从主动存货箱（绿箱）取货」的优先集货箱（蓝箱）。
bulk-crafting=光标放在配方上时：\n - 按 __ALT_CONTROL__1__craft-5__ 可制作5个。\n - 按 __ALT_CONTROL__1__craft-all__ 可尽可能多地制作。
burner-inserter-refueling=[entity=burner-inserter]可由其他机械臂装填燃料，也能在搬运燃料时先为自身装填燃料。
circuit-network=信号网络是一种能在机器之间传递信息的系统。\n可使用[shortcut=give-red-wire]和[shortcut=give-green-wire]将机器连接至信号网络。\n网络中的每一个信号种类都可以传递-2³¹（-2,147,483,648）至2³¹（2,147,483,647）的整数值。\n无需信号网络也能通关游戏，但很多有趣的设计和精细优化的工厂都离不开此。
clear-cursor=手持物品时，按 __CONTROL__clear-cursor__ 可清空光标，使物品返回背包中的[img=utility/hand]槽位。\n此操作同样会取消铁轨规划、线缆拖拽和选择框的操作。
connect-switch=当光标持有[shortcut=give-copper-wire]时，按__ALT_CONTROL__1__build__可将电线连接到实体上。\n在实体上按__ALT_CONTROL__1__remove-pole-cables__可移除所有电线。
construction-robots=[entity=construction-robot]负责执行物流网络中的建设、拆除、升级和维修指令。\n建设指令在虚影建筑、[item=blueprint]铺设、友方设施被毁或需要重建时发出。\n拆除指令在使用[item=deconstruction-planner]选择所需的实体时发出。\n升级指令在使用[item=upgrade-planner]时发出。\n使用撤销功能时也会创建这些指令。
copy-entity-settings=使用 __CONTROL__copy-entity-settings__ 和 __CONTROL__paste-entity-settings__ 可以在实体间复制设置。\n譬如，你可以在[entity=assembling-machine-2]之间复制粘贴来设置生产配方，或在箱子之间复制粘贴来设定容量上限。\n按 __ALT_CONTROL__1__paste-entity-settings__ 并拖拽，可一次性将设置粘贴到多个实体上。
copy-entity-settings-controller=使用 __CONTROL__copy-entity-settings__ 和 __CONTROL__paste-entity-settings__ 可以在实体之间复制设置。\n譬如，你可以在[entity=assembling-machine-2]之间复制粘贴来设置生产配方，或在箱子之间复制粘贴来设定容量上限。\n按住 __CONTROL__paste-entity-settings__ 的同时按 __CONTROL__MOVE__ 移动，可向多个实体快捷粘贴设置。
copy-paste=复制工具（__CONTROL__copy__）可将选区保存到剪贴板。\n粘贴工具（__CONTROL__paste__）检索要建造的上次复制的选区。\n__CONTROL__cycle-clipboard-forwards__ 和 __CONTROL__cycle-clipboard-backwards__ 可在剪贴板历史记录循环浏览。
copy-paste-filters=可在具有可配置的筛选器、物流请求以及容器专用槽位之间复制粘贴设置，譬如[entity=fast-inserter]、[entity=splitter]、[entity=requester-chest]、[entity=cargo-wagon]。
copy-paste-requester-chest=可在[entity=requester-chest]之间复制粘贴，复制物流请求。\n也可以将[entity=assembling-machine-2]中的设置复制粘贴到[entity=requester-chest]，根据配方设置物流请求。
copy-paste-spidertron=在[entity=spidertron]之间复制粘贴将复制机甲颜色和物流请求。\n这也将尝试复制装备网格的配置，如果玩家背包中有对应的装备则会自动装上。
copy-paste-trains=可在[entity=locomotive]之间复制粘贴，复制列车时刻表和颜色。\n可在[entity=train-stop]之间复制粘贴，复制车站名称和颜色。\n最后，可在[entity=locomotive]和[entity=train-stop]之间复制粘贴，复制颜色。
drag-building=按直线建造的最快方法是按住 __CONTROL__build__ ，同时向所需方向移动，譬如一排的[entity=stone-furnace]。
drag-building-poles=如果通过拖动建造[entity=small-electric-pole]，会自动以最大接线距离建造。
drag-building-underground-belts=如果通过拖动建造[entity=underground-belt]或[entity=pipe-to-ground]，会自动在最大连接距离处建造。
e-confirm=游戏中的所有绿色按钮都能通过按下 __CONTROL__confirm-gui__ 进行「确认」。
electric-network=电力网络将电力均匀地从发电端（如[entity=steam-engine]或[entity=solar-panel]）输送至用电端。\n在电线杆上按 __ALT_CONTROL__1__open-gui__ 可显示其所在电网的统计数据。
electric-pole-connections=电线杆会自动连接到其「接线范围」内的其他电线杆。\n可以使用 [shortcut=give-copper-wire] 手动添加或删除接线。\n在电线杆上按 __CONTROL__remove-pole-cables__ 可移除所有接线。
entity-flip=大多数实体都可以翻转，按 __CONTROL__flip-horizontal__ 水平翻转，按 __CONTROL__flip-vertical__ 垂直翻转。即可翻转手持物品，也可将光标放于实体上将其翻转。
entity-transfers=在实体上按 __ALT_CONTROL__1__fast-entity-transfer__ 可以从实体中取出物品。\n持有物品时按 __ALT_CONTROL__1__fast-entity-transfer__ 可将其放入所选实体中。\n\n\n本教学将教你在不打开实体的情况下，如何以不同方式将物品转移到实体或从实体中提取物品。
fast-belt-bending=拖动[entity=transport-belt]时按 __CONTROL__rotate__ 可以快速实现无缝转弯。
fast-obstacle-traversing=在可能的情况下，拖动[entity=transport-belt]遇到障碍物时，会自动建造[entity=underground-belt]穿越障碍。
fast-replace=在相同类型和大小的实体上建造将执行快捷替换。快捷替换将保留原始实体的属性，比如包含的物品和所选配方。
fast-replace-belt-splitter=[entity=transport-belt]和[entity=splitter]之间是可以相互快捷替换的。
fast-replace-belt-underground=[entity=transport-belt]和[entity=underground-belt]之间是可以相互快捷替换的。\n地下传送带入口和出口之间的传送带会在替换过程中自动回收。\n该机制对于[entity=pipe]和[entity=pipe-to-ground]同样适用。
fast-replace-direction=通过快捷替换可以快速改变实体的方向。
gate-over-rail=[entity=gate]可修建在纵向或横向[entity=straight-rail]上。\n列车会自动打开大门通过，不会在你的防御体系上留下漏洞。
ghost-building=手持可铺设物品时按 __ALT_CONTROL__1__build-ghost__ 可铺设虚影建筑。\n范围内的任何物流网络都会自动建造实体虚影。
ghost-rail-planner=虚影铁轨规划器用于规划长距离的新建虚影铁轨。\n要使用虚影规划器，请在进行铁轨规划时按住 __CONTROL_MODIFIER__build-ghost__ 。\n你还可以按住 __CONTROL_MODIFIER__build-with-obstacle-avoidance__ 来进行带有避障功能的虚影铁轨规划。
inserters=机械臂能够从一侧地格上抓取物品，然后在另一侧地格上放置。\n这样就能够在[entity=transport-belt]、[entity=iron-chest]、[entity=burner-mining-drill]、[entity=stone-furnace]和其他机器之间搬运物品。
insertion-limits=机械臂并不总是装满目标的全部储存空间，这使得其他机械臂也能搬运到物品。\n譬如，如果一台[entity=boiler]中已有5个或以上的[item=coal]，那么机械臂便不会继续装填。这使得剩余燃料可以通过传送带运至后面的锅炉，而非所有燃料都被第一台锅炉截留。\n此外，这一机制同样适用于[entity=gun-turret]、[entity=assembling-machine-1]、[entity=stone-furnace]、[entity=lab]等实体。
limit-chests=通过选择容器中的红叉，可以封闭部分仓储空间，从而限制容器的可用容量。\n机械臂将无法向已封闭的空间放置，这相当于减少了容器的总容量，有效防止了生产过剩。
logistic-network=物流网络是一种强大的自动递送网络，通过飞行的机器人实施物品搬运作业和自动建设作业。\n它有三个主要组成部分：\n - [entity=roboport]用于确定网络覆盖范围，并为机器人提供充电停放机位。\n - [entity=logistic-robot]负责执行物流作业指令，[entity=construction-robot]负责执行建设作业指令。\n - [tooltip=物流箱,tips-and-tricks-item-description.storage-chest-list]用于为网络供应物品。
long-handed-inserters=[entity=long-handed-inserter]是一种电力机械臂，能够在距自身两格远的距离抓取和放置物品，而不是通常的一格距离。
low-power=若耗电量高于发电装机量，工厂中的机器就会因电力供应不足而运转缓慢。\n请随时留意机器运行速度，及时发现电力短缺情况，以免难以补救。\n确保电力充足的最佳方法是查看电网统计，确认「保障」是绿色的满格状态。
move-between-labs=[entity=inserter]能够在[entity=lab]之间转运科技包。
passive-provider-chest=[entity=passive-provider-chest]可为物流网络供应物品。\n这意味着被动供货箱（红箱）中的任意物品都可被机器人取走，用于达成物流或建设指令。
personal-logistics=[entity=logistic-robot]会从物流箱送来物品，满足背包物流需求。\n背包物流有需求下限和需求上限。机器人会一直送来物品，直到物品数量高于需求下限。\n如果物品数量高于需求上限，多余的物品会被移至背包物流回收区，由机器人将其运走。
pipette=使用 __CONTROL__pipette__ 将选中的实体放入光标。\n在远程视图中使用时，则将所选实体的虚影放入光标。
pole-dragging-coverage=如果通过拖动到用电设备来建造[entity=small-electric-pole]，范围内的任何机器都不会被跳过。
pump-connection=[entity=fluid-wagon]只有停靠在正对[entity=pump]的位置才会进行连接。\n这是向[entity=fluid-wagon]装卸流体的必要步骤。
rail-building=要开启铁轨建造模式，需手持[item=rail]并在现有铁轨上按 __CONTROL__build__ 。\n按 __ALT_CONTROL__1__build__ 确认铁轨的预期位置。\n按 __CONTROL__clear-cursor__ 关闭铁轨建造模式。
rail-signals-advanced=[entity=rail-chain-signal]会根据前方信号的状态来确定自身的信号，以确保列车进入前方区段后能够顺利驶出。\n通过与[entity=rail-signal]配合使用，可以构建更复杂的铁轨交叉口。\n\n\n本教学将教你如何使用连锁铁路信号来构建复杂的铁轨交叉口，并有效防止死锁现象的发生。
rail-signals-basic=[entity=rail-signal]可将铁轨划分为数个区段。每辆[entity=locomotive]都会读取铁路信号，以免与其他列车相撞。\n\n\n\n本教学将教你如何用铁路信号在同一条铁轨上部署多个班次列车。
repair-packs=手持[item=repair-pack]时，在实体上按住 __CONTROL__build__ 即可修复。
requester-chest=[entity=requester-chest]可从物流网络请求物品。\n[entity=logistic-robot]将从物流网络送来物品满足需求。
rotating-assemblers=一些配方需要在[entity=assembling-machine-2]上增加一个流体入口，譬如[recipe=electric-engine-unit]。在组装机上按 __CONTROL__rotate__ 可以旋转其流体入口的方向。
shoot-targeting=按 __CONTROL__shoot-enemy__ 可射击光标附近的敌方目标。\n按 __CONTROL__shoot-selected__ 可射击选定的中立或友方实体。
shoot-targeting-controller=按住 __CONTROL__shoot-enemy__，可射击敌方目标。\n使用控制器时，所有武器会自动瞄准区域内最近的敌人。按 __CONTROL__look__可改变自动瞄准区域。\n按 __CONTROL__shoot-selected__ 可射击选定的中立或友方实体。
show-info=按 __CONTROL__show-info__ 可在设施上显示细节信息，亦被称为「Alt模式」。
spidertron-control=[entity=spidertron]可通过 __CONTROL__toggle-driving__ 进入，并使用 __CONTROL_MOVE__ 驾驶。\n也可以用 __CONTROL__give-spidertron-remote__ 操控。__CONTROL__use-item__ 向蜘蛛机甲发送指令，__CONTROL__alternative-use-item__ 下达队列移动指令。\n__CONTROL__select-for-cancel-deconstruct__ 可将另一台蜘蛛机甲加入当前选区，而 __CONTROL__deselect__ 取消选区。
splitters=[entity=splitter]用于分割、合并或平衡传送带。\n如果两个输出端都有空闲空间，输入的物品会被平均拆分，或者被传送到任何空闲的输出端。\n可将其设置为筛选特定物品，或优先处理其中一个输入或输出端。
stack-transfers=__CONTROL__stack-transfer__ 可转移一个物品堆叠。\n __CONTROL__inventory-transfer__ 可转移指定物品的所有堆叠。（对空格点击将转移所有）\n上述操作中，若使用 __CONTROL_RIGHT_CLICK__ 代替 __CONTROL_LEFT_CLICK__，则只会转移物品数量的一半。\n\n本教学中对此有更详细的说明。
steam-power=[entity=boiler]消耗[item=coal]等可燃燃料，将[fluid=water]转化为[fluid=steam]。\n[entity=steam-engine]消耗[fluid=steam]产生电能，再通过电力网络配送至用电端。
storage-chest=[entity=storage-chest]储存从背包物流回收区和拆除指令取回的物品。\n被动存货箱（黄箱）中的任何物品都能供应给物流或建设指令。\n通过筛选设置，被动存货箱（黄箱）可只接受一种物品。
storage-chest-list=各类物流箱按照如下优先顺序供应储存物：\n[entity=active-provider-chest]主动供货箱（紫箱）\n[entity=buffer-chest]主动存货箱（绿箱）\n[entity=storage-chest]被动存货箱（黄箱）\n[entity=passive-provider-chest]被动供货箱（红箱）
train-stop-same-name=[entity=train-stop]可以与其他车站共享名称。在时刻表中使用该名称的列车可以将其中任何一个车站作为目的地。\n你可以为每个车站设置列车限制，以更精确地控制实际运行。
train-stops=[entity=train-stop]为列车提供一个可命名的位置，实现自动化物品运输。\n\n\n\n本教学将教你如何建立一个车站，以及如何设置一个简单的列车时刻表。
trains=列车适用于高吞吐量和长距离运输。\n按 __CONTROL__toggle-driving__ 进入列车，用 __CONTROL_MOVE__ 驾驶列车。
usable-items=除了在世界中建造实体外，一些物品还有其他用途。譬如，你可以向敌人投掷[item=grenade]来对其造成伤害。\n手持可使用物品时按 __ALT_CONTROL__1__build__ 即可发挥其作用。
z-dropping=按 __CONTROL__drop-cursor__，可以从光标中丢下一个物品。\n你可将物品丢到地上、传送带上或放入实体中。\n按住 __CONTROL__drop-cursor__，并在多个实体上拖动光标，可快速向每个实体放入一个物品。
