[technology-description]
advanced-circuit=更先进的集成电路。
advanced-material-processing=更高效、适用更广的冶炼炉。
advanced-oil-processing=原油精炼，可进一步提炼其他产品。
artillery=一种安装在炮塔或车厢上的远程火炮，可以向远处的敌方建筑自动开炮，也可以用瞄准器向更远的位置手动开炮。
artillery-shell-range=提高重炮的自动射程和手动射程。
artillery-shell-speed=提高重炮的射速。
atomic-bomb=一种极具毁灭性的火箭弹，能瞬间荡平一大片区域。
automated-rail-transportation=可建立列车停靠站和铁路信号，以设置自动列车路线，并协调同一铁路网络中的多辆列车。
automation=自动化批量生产的关键技术。
automation-2=能够处理流体原料的组装机。
automation-3=能够处理流体原料的组装机，并具有更快速度和更多插件槽。
automation-science-pack=可以研究基本的自动化方法。
automobilism=一种引擎驱动的交通工具。
battery=为电子设备存储和供应能量的化学电池。
battery-equipment=装入装甲中，储存多余能量，以备不时之需。
battery-mk2-equipment=装入装甲中，储存大量能量，以备不时之需。
belt-immunity-equipment=装入装甲中，防止你被传送带移动。
braking-force=列车可以更快地减速，从而可以获得更长的高速行驶时间。
bulk-inserter=集装机械臂可同时移动多个物品。
chemical-science-pack=允许利用原油产品研究高级物品。
circuit-network=用线将机器连接起来，使其对信号做出反应，从而更好地控制机器。
cliff-explosives=足以炸毁悬崖的炸药桶。
coal-liquefaction=利用蒸汽和重油将煤炭转化为原油产品的处理工艺。
concrete=高级建筑材料，也可用于铺设地板。
construction-robotics=建设机器人可以修复和建造友方实体，还可以通过放置虚影来指挥它们建造新设施。
defender=最基础的战斗无人机型号，可在一小段时间内跟随并辅助玩家。
destroyer=最高级的战斗无人机型号，可在一小段时间内跟随并辅助玩家。
discharge-defense-equipment=装入装甲中，使用瞄准器启动时可对附近的敌人造成伤害、击退和眩晕。
distractor=战斗无人机的中等型号，可在部署位置向敌方射击、吸引火力。
effect-transmission=插件效果分享塔将升级插件的效果，分享到附近的友方实体，分享效果以递减方式叠加。
efficiency-module=该插件可降低机器能耗。
electric-energy-accumulators=可储存富余电能的设施。
electric-energy-distribution=适用性更广的配电方式。
electric-engine=将电力转化为机械运动。
electronics=用于基本信号处理的电子元件。
energy-shield-equipment=装入装甲中，吸收伤害。
energy-shield-mk2-equipment=装入装甲中，吸收大量伤害。
engine=将燃料转化为机械运动，是所有载具的重要构成。
exoskeleton-equipment=装入装甲中，可提高移动速度，并可同时装备多个外骨骼模块。
explosive-rocketry=爆炸力极强的火箭弹，爆炸半径更大。
explosives=研发危险但可控的炸药。
fast-inserter=通过改进电子组件，使机械臂动作更迅捷。
fission-reactor-equipment=装入装甲中，为其他装备供电。
flamethrower=强大的手持式和炮塔式火焰喷射器，向敌人发射攻击性液体，使其着火。
flammables=研发更高效的燃料和更强烈的易燃物。
fluid-handling=储存和运输流体所需的多种技术。
fluid-wagon=可通过铁路运输流体。液罐车厢停在直线区间时，可通过铁路旁的管道泵装卸流体。
follower-robot-count=提高可同时跟着你的战斗无人机的数量上限。
gates=可在需要时打开一截墙壁以供进出，可通过信号网络自动控制。
gun-turret=基础防御工事，需要为其装填子弹。
heavy-armor=重型装甲，提供更多保护。
inserter-capacity-bonus=允许集装机械臂同时移动更多物品。某些升级甚至会为非集装机械臂增加少许堆叠功能。
kovarex-enrichment-process=从铀-238中生成铀-235的过程，这需要大量的铀-235作为催化剂。
lamp=照明，提高夜间能见度。
land-mine=安置在地面上的爆炸陷阱，敌人走过去就会触发。爆炸后可由建设机器人重新安置。研究「烈性炸药」科技可提升伤害。
landfill=可铺设在水面上，生成可建造的地形。
laser=可造成伤害的聚焦光束。
laser-shooting-speed=提高激光武器的射速。
laser-turret=高级防御工事，仅需为其供应电力即可。
laser-weapons-damage=提高能量武器和激光束的伤害。
logistic-robotics=物流机器人可以为玩家运送物品，或带走不需要的物品。
logistic-science-pack=可以研究改进的物流、自动化和初级军事相关。
logistic-system=解锁更多物流箱，物流机器人的应用场景将得以扩展。优先集货箱（蓝箱）可从物流网络中请求并优先收集指定物品。主动供货箱（紫箱）会把里面的物品主动推送到储存处或需求处。主动存货箱（绿箱）也可请求并收集指定物品，通常用于供应背包物流和自动建设。
logistics=更快、更灵活的运输方式。
low-density-structure=一种既轻盈又坚固的材料，极其适用于飞船和个人装备。
lubricant=将重油转化为润滑油，用于减少高速机器的摩擦。
military=保卫自己和工厂的更有效手段。
military-science-pack=可以研究更多军事选项。
mining-productivity=提高所有采矿机和抽油机的产量。
modular-armor=具有较小装备网格的装甲，可插入装备模块，让你获得独特的加成。穿上装甲也会扩大背包容量。
modules=可插入机器以提供加成的插件技术。
night-vision-equipment=装入装甲中，让你在夜间看得更清楚。
nuclear-fuel-reprocessing=从乏燃料棒中提取铀-238的后处理过程。
nuclear-power=利用铀燃料棒发电的强大而复杂的方法。
oil-gathering=用抽油机采集原油。
oil-processing=原油提炼，用于生产塑料、硫磺和燃料。
personal-laser-defense-equipment=装入装甲中，可自动向附近的敌人开火。
personal-roboport-equipment=装入装甲中，可让建设机器人直接从背包中飞出来作业。
personal-roboport-mk2-equipment=装入装甲中，可让许多建设机器人直接从背包中飞出来作业。
physical-projectile-damage=提高基于动能弹药的武器伤害。
plastics=可模塑成固体的合成聚合材料。
power-armor=具有较大装备网格和背包容量加成的装甲。
power-armor-mk2=具有很大装备网格和背包容量加成的装甲。
processing-unit=适用于高级计算的微处理器。
production-science-pack=可以研究更高效的机器和流程。
productivity-module=该插件可让机器用相同数量的原料生产出更多产品，但也会增加能耗和降低速度。
radar=可显示附近区域并进一步探索的机器。
railway=长距离大规模运输。
refined-flammables=提高火焰武器的伤害。
repair-pack=修理损坏机器的工具。
research-speed=开启更高效的研究实践。
robotics=飞行机器人的主体部分，进一步加工后可从事物流工作或建设工作。
rocket-fuel=先进的多用途燃料。
rocket-silo=让玩家能够发射火箭至太空，以此通关游戏。
rocketry=个人火箭弹发射器，可袭扰敌人。
solar-energy=免费电力来源，但在夜间无用。
solar-panel-equipment=装入装甲中，为其他装备供电，但在夜间无用。
space-science-pack=允许将研究火箭送入太空，并从中接收科学数据，用于生产太空科技包（白瓶）。
speed-module=该插件可提高机器的生产速度，但会增加能耗。
spidertron=一款能够穿越复杂地形的多功能载具，配备了高射速火箭筒，支持手动瞄准或自动攻击。既能手动驾驶，也可通过蜘蛛机甲遥控器进行远程操控。
steel-axe=可提高手动采矿速度。
steel-processing=可将铁板冶炼成钢材的技术。
stone-wall=保护工厂的墙壁。
stronger-explosives=提高基于炸药武器的伤害。
sulfur-processing=用于生产硫酸和爆炸物的高活性非金属化学品。
tank=一款可搭载多种武器的进攻型载具。
toolbelt=可扩大玩家背包。
uranium-ammo=使用铀-238制造的高级弹药，其硬度和重量的优势能产生巨大的破坏力。
uranium-mining=允许[entity=electric-mining-drill]消耗[fluid=sulfuric-acid]来开采[entity=uranium-ore]。
uranium-processing=铀矿在离心机中被处理为铀-238，并有概率产生富含铀-235的产物，这两者都是制造铀燃料棒所需的。
utility-science-pack=可以研究更强大的武器装备和个人装备，以及提升机器人协同能力。
weapon-shooting-speed=提高基于动能弹药的武器射速。
worker-robots-speed=提高物流机器人和建设机器人的飞行速度。
worker-robots-storage=提高物流机器人和建设机器人每次可携带货物的数量。
